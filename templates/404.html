{% extends "base.html" %}
{% block title %}Page non trouvée (404){% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3 text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #ffc107;"></i>
            </div>
            <h1 class="display-1">404</h1>
            <h2 class="mb-4">Page non trouvée</h2>
            <p class="lead mb-4">La page que vous cherchez n'existe pas ou a été supprimée.</p>
            
            <div class="btn-group mb-4" role="group">
                <a href="/" class="btn btn-primary btn-lg">Accueil</a>
                <a href="/documents" class="btn btn-secondary btn-lg">Documents</a>
                <a href="/upload" class="btn btn-success btn-lg">Uploader</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
